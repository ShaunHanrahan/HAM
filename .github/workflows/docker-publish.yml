name: Publish Docker image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker/**
      - server.js
      - vendor.mjs
      - package.json
      - public/**
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

# Serialize builds so two quick pushes can't race and leave :latest on the older commit.
concurrency:
  group: docker-publish
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/shaunhanrahan/ham:latest
            ghcr.io/shaunhanrahan/ham:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
